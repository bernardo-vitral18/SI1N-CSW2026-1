<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>

<body>
    <form>
        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Digite seu nome" name="nome">

        <label for="email">Email pessoal</label>
        <input type="email" id="email" placeholder="Digite seu e-mail @" name="email">

        <label for="Senha">Senha</label>
        <input type="password" id="Senha" name="Senha">

        <label for="Idade">Idade</label>
        <input type="text" id="Idade" name="Idade">

        <label for="Comentario">Deixe um comentário</label><br>
        <textarea name="Comentario" cols="50" rows="10" placeholder="Escreva aqui um comentário"></textarea>


        <label for="interesse">Material de Interesse:</label>
        <br>
        <input type="checkbox" id="Backend" name="Backend"> Backend
        <input type="checkbox" id="Backend" name="Backend"> FrontEnd
        <input type="checkbox" id="Backend" name="Backend">FullStack

        <br><br>
        <label for="viagem">Tipo de Viagem:</label> <br>
        <input type="radio" id="opcao" name="opcao" value="yes">Negócios<br>
        <input type="radio" id="opcao" name="opcao" value="yes">Lazer <br>
        <input type="radio" id="opcao" name="opcao" value="yes">Turismo <br>
        <input type="radio" id="opcao" name="opcao" value="yes">Acadêmico <br>

        <br><br>

        <label for="esporte">Esporte Favorito:</label> <br>
        <select name="esporte" multiple size="3">
            <option value="">Selecione</option>
            <option value="Futebol">Futebol</option>
            <option value="Voleibol">Voleibol</option>
            <option value="Basquete">Basquete</option>
        </select>

        <br><br>
        <label for="investimentos">Investimentos:</label><br>
        <select name="investimento" size="1">
            <option value="">Selecione</option>
            <option value="cdb">CDB</option>
            <option value="tesouro">Tesouro Direto</option>
            <option value="fundos">Fundos Imobiliários</option>
            <option value="cdi">CDI</option>
        </select>

        <br><br>
        <label for="cor">Escolha uma cor:</label><br>
        <input type="color">

        <br><br>
        <input type="file">Adicione um arquivo</label>





    </form>
</body>

</html>
