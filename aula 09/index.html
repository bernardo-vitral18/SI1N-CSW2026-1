<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>

<body>
    <form>
        <table border="1" celpading="5" colpading="0">
            <tr>
                <td><label for="nome">Nome</label></td>
                <td><input type="text" id="nome" placeholder="Digite seu nome" name="nome"></td>
            </tr>

            <tr>
                <td><label for="email">Email pessoal</label></td>
                <td><input type="email" id="email" placeholder="Digite seu e-mail @" name="email"></td>
            </tr>

            <tr>
                <td><label for="Senha">Senha</label></td>
                <td><input type="password" id="Senha" name="Senha"></td>
            </tr>

            <tr>
                <td><label for="Idade">Idade</label></td>
                <td><input type="text" id="Idade" name="Idade"></td>
            </tr>

            <tr>
                <td colspan="2"><label for="Comentario">Deixe um comentário</label><br>
                    <textarea name="Comentario" cols="50" rows="10" placeholder="Escreva aqui um comentário"></textarea>
                </td>
            </tr>

            <tr>
                <td><label for="interesse">Matéria de Interesse:</label>
                    <br>
                    <input type="checkbox" id="Backend" name="Backend"> Backend<br>
                    <input type="checkbox" id="Backend" name="Backend"> FrontEnd<br>
                    <input type="checkbox" id="Backend" name="Backend">FullStack<br>
                </td>



                <td><label for="viagem">Tipo de Viagem:</label> <br>
                    <input type="radio" id="opcao" name="opcao" value="yes">Negócios<br>
                    <input type="radio" id="opcao" name="opcao" value="yes">Lazer <br>
                    <input type="radio" id="opcao" name="opcao" value="yes">Turismo <br>
                    <input type="radio" id="opcao" name="opcao" value="yes">Acadêmico <br>
                </td>
            </tr>

            <br><br>

            <tr>
                <td>
                    <label for="esporte">Esporte Favorito:</label><br>
                    <select name="esporte" id="esporte" multiple size="3">
                        <option value="">Selecione</option>
                        <option value="Futebol">Futebol</option>
                        <option value="Voleibol">Voleibol</option>
                        <option value="Basquete">Basquete</option>
                    </select>
                </td>

                <td><label for="investimentos">Investimentos:</label>
                    <select name="investimento" size="1">
                        <option value="">Selecione</option>
                        <option value="cdb">CDB</option>
                        <option value="tesouro">Tesouro Direto</option>
                        <option value="fundos">Fundos Imobiliários</option>
                        <option value="cdi">CDI</option>
                    </select>
                </td>
            </tr>


            <tr>
                <td><label for="cor">Escolha uma cor:</label><br>
                    <input type="color">
                </td>

                <td><label for="file">SELECIONE O ARQUIVO</label>
                    <input type="file" name="file" id="file"></input>
                </td>
            </tr>

            <tr>
                <td><label for="data">Data e Hora de envio</label>
                    <input type="datetime-local" name="data" id="data">
                </td>
            </tr>

            <tr>
                <td><input type="submit" value="Enviar"></td>
                <td><input type="reset" value="Limpar">
                </td>
            </tr>


        </table>


    </form>
</body>

</html>
