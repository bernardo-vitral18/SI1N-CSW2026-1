<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Music Links</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      gap: 30px;
    }

    /* ── DIV 1 — Pseudo-seletores ── */
    .div1 {
      background: white;
      border: 2px solid #ccc;
      border-radius: 10px;
      padding: 30px;
      width: 400px;
      text-align: center;
    }

    .div1 h2 {
      margin-bottom: 20px;
      color: #333;
    }

    .botao {
      display: inline-block;
      padding: 12px 30px;
      background: #3a3a3a;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-size: 15px;
    }

    /* :hover — muda de cor ao passar o mouse */
    .botao:hover {
      background: #1a73e8;
    }

    /* :active — muda de cor ao clicar */
    .botao:active {
      background: #c0392b;
    }

    /* ── DIV 2 — Links musicais ── */
    .div2 {
      background: white;
      border: 2px solid #ccc;
      border-radius: 10px;
      padding: 30px;
      width: 400px;
    }

    .div2 h2 {
      margin-bottom: 20px;
      color: #333;
      text-align: center;
    }

    .music-link {
      display: block;
      padding: 12px 16px;
      margin-bottom: 10px;
      background: #f8f8f8;
      border: 1px solid #ddd;
      border-radius: 8px;
      text-decoration: none;
      font-size: 15px;
      color: #333;
    }

    /* ✻ antes e depois via ::before e ::after */
    .music-link::before,
    .music-link::after {
      content: ' ✻ ';
      color: #aaa;
    }

    /* :hover */
    .music-link:hover {
      background: #1a73e8;
      color: white;
      border-color: #1a73e8;
    }

    /* :active */
    .music-link:active {
      background: #c0392b;
      color: white;
    }
  </style>
</head>
<body>

  <!-- DIV 1 -->
  <div class="div1">
    <h2>Pseudo-seletores</h2>
    <a class="botao" href="#">Passe o mouse / Clique aqui</a>
  </div>

  <!-- DIV 2 -->
  <div class="div2">
    <h2>Plataformas musicais</h2>
    <a class="music-link" href="https://open.spotify.com" target="_blank">♬ Spotify</a>
    <a class="music-link" href="https://music.youtube.com" target="_blank">♬ YouTube Music</a>
    <a class="music-link" href="https://music.amazon.com" target="_blank">♬ Amazon Music</a>
  </div>

</body>
</html>
